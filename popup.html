<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>截词英语学习助手</title>
  <link rel="stylesheet" href="popup-styles.css">
</head>
<body>
<div id="oobe" class="oobe is-hidden">
  <div class="oobe-card">
    <div class="oobe-step is-active" data-step="1">
      <div class="oobe-title" id="oobeTitle1">Hello!</div>
      <div class="oobe-text" id="oobeText1"></div>
      <button id="oobeNext1" class="btn btn-primary oobe-primary">Start</button>
    </div>
    <div class="oobe-step" data-step="2">
      <div class="oobe-title" id="oobeTitle2">Download</div>
      <div class="oobe-text" id="oobeText2"></div>
      <div class="oobe-vocab">
        <div class="oobe-subtitle">已下载词库</div>
        <div id="oobeVocabList" class="oobe-vocab-list"></div>
        <div id="oobeVocabEmpty" class="oobe-vocab-empty">暂无已下载词库</div>
      </div>
      <div class="oobe-actions">
        <button id="oobeOpenDownload" class="btn btn-secondary oobe-secondary">Download</button>
        <button id="oobeNext2" class="btn btn-primary oobe-primary">Continue</button>
      </div>
    </div>
    <div class="oobe-step" data-step="3">
      <div class="oobe-title" id="oobeTitle3">Done</div>
      <div class="oobe-text" id="oobeText3"></div>
      <div class="oobe-actions">
        <button id="oobeGoExample" class="btn btn-primary oobe-primary">Go</button>
        <button id="oobeSkip" class="btn btn-secondary oobe-secondary">Skip</button>
      </div>
    </div>
  </div>
</div>
<div class="container">
  <div class="page is-active" id="pageMain">
    <h1 id="titleLink">截词英语学习助手</h1>

    <div class="control-section">
      <label class="setting-label">
        <span class="label-text">显示模式</span>
        <button class="help-icon" type="button" aria-label="帮助">
          ?
          <span class="help-tooltip">这个选项控制插件改写内容的模式。关闭代表不会改写内容；下划线模式下插件会在匹配的单次下面画下划线，您可以将鼠标放到对应的单词上面查看单词详情；标注模式下插件不仅会在对应单词下画下划线，并且会将对应外文放在右侧括号中</span>
        </button>
      </label>
      <div class="mode-slider-container">
        <input type="range" id="displayModeSlider" min="0" max="2" step="1" value="0">
        <div class="mode-slider-track">
          <div class="mode-slider-thumb"></div>
        </div>
        <div class="mode-labels">
          <span class="mode-label" data-mode="0">关闭</span>
          <span class="mode-label" data-mode="1">下划线</span>
          <span class="mode-label" data-mode="2">标注</span>
        </div>
      </div>
    </div>

    <div class="control-section">
      <label class="setting-label">
        <span class="label-text">标注模式</span>
        <button class="help-icon" type="button" aria-label="帮助">
          ?
          <span class="help-tooltip">这里配置插件是将中文改写为英文还是英文改写为中文，自动模式下插件会自行进行选择</span>
        </button>
      </label>
      <div class="mode-slider-container">
        <input type="range" id="annotationModeSlider" min="0" max="2" step="1" value="1">
        <div class="mode-slider-track">
          <div class="mode-slider-thumb"></div>
        </div>
        <div class="mode-labels">
          <span class="mode-label" data-mode="0">中→英</span>
          <span class="mode-label" data-mode="1">自动</span>
          <span class="mode-label" data-mode="2">英→中</span>
        </div>
      </div>
    </div>

    <div class="control-section">
      <label class="setting-label">
        <span class="label-text">智能去重</span>
        <button class="help-icon" type="button" aria-label="帮助">
          ?
          <span class="help-tooltip">这个选项用来控制一个单词出现的频率。关闭状态下插件不会控制一个页面上某个单词被标注的次数；单网页内不重复会让一个单词在一个网页中只被标记一次；一定次数内不重复会让一个单词被标注了一次后一定次数内不会被再次标注（具体次数可以在高级设置中进行配置）</span>
        </button>
      </label>
      <div class="mode-slider-container">
        <input type="range" id="dedupeModeSlider" min="0" max="2" step="1" value="1">
        <div class="mode-slider-track">
          <div class="mode-slider-thumb"></div>
        </div>
        <div class="mode-labels">
          <span class="mode-label" data-mode="0">关闭</span>
          <span class="mode-label" data-mode="1">单网页内不重复</span>
          <span class="mode-label" data-mode="2">一定次数内不重复</span>
        </div>
      </div>
    </div>

    <div class="stats-section stats-inline">
      <div class="stat-item">
        <span class="stat-label setting-label">
          <span class="label-text">总词条数</span>
          <button class="help-icon" type="button" aria-label="帮助">
              ?
              <span class="help-tooltip">已导入词库的总词条数（去重）</span>
          </button>
        </span>
        <span id="totalWords" class="stat-value">0</span>
      </div>

    </div>

    <div class="settings-section nav-section">
      <div class="settings-header" id="vocabularyToggle">
        <h2>
          <span class="label-text">词库管理</span>
        </h2>
        <span class="toggle-icon">▶</span>
      </div>
    </div>

    <div class="settings-section nav-section">
      <div class="settings-header" id="advancedToggle">
        <h2>高级设置</h2>
        <span class="toggle-icon">▶</span>
      </div>
    </div>

  </div>

  <div class="page" id="pageVocab">
    <div class="page-header">
      <button class="page-back-btn" id="vocabBack" type="button" aria-label="返回">←</button>
      <div class="page-title">词库管理</div>
      <div class="page-meta">(<span id="fileCount">0</span>)</div>
    </div>
    <div class="settings-section">
      <div class="settings-content" id="vocabularyContent">
        <div class="import-controls">
          <input type="file" id="fileInput" accept=".json" multiple style="display: none;">
          <button id="importBtn" class="btn btn-primary">选择文件</button>
          <button id="downloadBtn" class="btn btn-secondary">从服务器下载</button>
          <span id="importStatus" class="import-status"></span>
        </div>
        <div id="filesList" class="files-list"></div>
      </div>
    </div>
  </div>

  <div class="page" id="pageAdvanced">
    <div class="page-header">
      <button class="page-back-btn" id="advancedBack" type="button" aria-label="返回">←</button>
      <div class="page-title">高级设置</div>
    </div>
    <div class="settings-section nav-section">
      <div class="settings-header" id="styleNav">
        <h2>样式设置</h2>
        <span class="toggle-icon">▶</span>
      </div>
    </div>
    <div class="settings-section nav-section">
      <div class="settings-header" id="annotationNav">
        <h2>标注设置</h2>
        <span class="toggle-icon">▶</span>
      </div>
    </div>
    <div class="settings-section nav-section">
      <div class="settings-header" id="aboutNav">
        <h2>关于</h2>
        <span class="toggle-icon">▶</span>
      </div>
    </div>
  </div>

  <div class="page" id="pageStyle">
    <div class="page-header">
      <button class="page-back-btn" id="styleBack" type="button" aria-label="返回">←</button>
      <div class="page-title">样式设置</div>
    </div>
    <div class="settings-section">
      <div class="settings-content">
        <div class="setting-item">
          <label for="highlightMode" class="setting-label">
            <span class="label-text">标注颜色</span>
            <button class="help-icon" type="button" aria-label="帮助">
              ?
              <span class="help-tooltip">这里用于设置被标注的颜色，被标注的单词会变成这里设定的颜色，自动的话插件会自己选择一个颜色（虽然不一定美观哦）</span>
            </button>
          </label>
          <div class="color-row">
            <select id="highlightMode">
              <option value="none">不更改颜色</option>
              <option value="auto">自动</option>
              <option value="custom">自定义</option>
            </select>
            <input type="color" id="highlightColor" value="#2196f3">
          </div>
        </div>
        <div class="setting-item">
          <label class="setting-label">
            <span class="label-text">单词弹窗大小</span>
            <button class="help-icon" type="button" aria-label="帮助">
              ?
              <span class="help-tooltip">插件记忆上次弹窗手动设置的大小，但是如果出现问题的话，您可以点击强制将记忆的弹窗大小恢复默认</span>
            </button>
          </label>
          <button id="resetPopupSize" class="btn btn-secondary">重置</button>
          <span id="resetPopupSizeStatus" class="setting-hint"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="page" id="pageAnnotation">
    <div class="page-header">
      <button class="page-back-btn" id="annotationBack" type="button" aria-label="返回">←</button>
      <div class="page-title">标注设置</div>
    </div>
    <div class="settings-section">
      <div class="settings-content">
        <div class="setting-item">
          <label for="maxMatchesSlider" class="setting-label">
            <span class="label-text">单句标注上限</span>
            <button class="help-icon" type="button" aria-label="帮助">
              ?
              <span class="help-tooltip">这里设置了一个段落中单个句子允许改写单词数量上限，最低为1 最高无限。（备注，有时候较短的内容可能被认为是多个段落，具体效果得看目标网站的实现）</span>
            </button>
          </label>
          <div class="range-row">
            <input type="range" id="maxMatchesSlider" min="1" max="9" value="3">
            <span id="maxMatchesLabel" class="range-label">3</span>
            <input type="number" id="maxMatchesInput" min="0" value="3">
          </div>
        </div>
        <div class="setting-item smart-toggle-row">
          <div class="setting-main">
            <label for="smartSkipCodeLinks" class="setting-label">
              <span class="label-text">智能跳过代码链接</span>
              <button class="help-icon" type="button" aria-label="帮助">
                ?
                <span class="help-tooltip">强烈建议开启，避免将网页链接内容与代码内容进行改写</span>
              </button>
            </label>
            <label class="switch">
              <input type="checkbox" id="smartSkipCodeLinks">
              <span class="slider"></span>
            </label>
          </div>
        </div>
        <div class="setting-item">
          <label for="minTextLength" class="setting-label">
            <span class="label-text">容器最小字数</span>
            <button class="help-icon" type="button" aria-label="帮助">
              ?
              <span class="help-tooltip">如果网页上某一块内容中字数少于这个值，那么跳过标记，避免将标题等短内容标记了导致页面不好看，推荐值为10</span>
            </button>
          </label>
          <div class="range-row">
            <input type="range" id="minTextLength" min="5" max="200" value="5" step="5">
            <span id="minTextLengthLabel" class="range-label">10</span>
          </div>
        </div>
        <div class="setting-item">
          <label for="dedupeRepeatCount" class="setting-label">
            <span class="label-text">去重间隔次数</span>
            <button class="help-icon" type="button" aria-label="帮助">
              ?
              <span class="help-tooltip">仅在“一定次数内不重复”模式下生效，一个单词背标记后多少次才能再次出现</span>
            </button>
          </label>
          <div class="range-row">
            <input type="range" id="dedupeRepeatCount" min="10" max="200" value="50" step="10">
            <span id="dedupeRepeatCountLabel" class="range-label">50</span>
          </div>
        </div>
        <div class="setting-item">
          <label for="clearDedupeCounts" class="setting-label">
            <span class="label-text">删除单词次数统计</span>
            <button class="help-icon" type="button" aria-label="帮助">
              ?
              <span class="help-tooltip">清除掉去重次数的间隔记录（即重新开始记录单词标记次数）</span>
            </button>
          </label>
          <button id="clearDedupeCounts" class="btn btn-delete">删除</button>
        </div>
      </div>
    </div>
  </div>

  <div class="page" id="pageAbout">
    <div class="page-header">
      <button class="page-back-btn" id="aboutBack" type="button" aria-label="返回">←</button>
      <div class="page-title">关于</div>
    </div>
    <div class="settings-section">
      <div class="settings-content">
        <div class="setting-item">
          <label class="setting-label">
            <span class="label-text">版本号</span>
          </label>
          <span id="aboutVersion" class="setting-value">-</span>
        </div>
        <div class="setting-item">
          <label class="setting-label">
            <span class="label-text">官网</span>
          </label>
          <a class="setting-link" href="https://jieci.top" target="_blank" rel="noopener noreferrer">jieci.top</a>
        </div>
        <div class="setting-item">
          <label for="debugMode" class="setting-label">
            <span class="label-text">调试模式</span>
            <button class="help-icon" type="button" aria-label="帮助">
              ?
              <span class="help-tooltip">开启后在控制台显示详细诊断信息，不建议开启，（谢谢您看我写的帮助内容🤗)</span>
            </button>
          </label>
          <label class="toggle-switch">
            <input type="checkbox" id="debugMode">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="setting-item">
          <label class="setting-label">
            <span class="label-text">帮助文档</span>
          </label>
          <a class="setting-link" href="http://jieci.top/help.html" target="_blank" rel="noopener noreferrer">查看</a>
        </div>
      </div>
    </div>
  </div>

  <!-- 下载词库模态框 -->
  <div id="downloadModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>从服务器下载词库</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <div class="loading-spinner" id="loadingSpinner">加载中...</div>
        <div class="dict-list" id="dictList"></div>
        <div class="download-progress" id="downloadProgress" style="display: none;">
          <div class="progress-info">
            <span id="downloadingDict">正在下载...</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="help-link">
    <a href="http://jieci.top/help.html" target="_blank" rel="noopener noreferrer">点此查看帮助文档</a>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
